spring:
    application:
        name: product-service
    cloud:
        function:
            definition: testEvent;consumeOrderCreatedEvent
        stream:
            bindings:
                testEvent-out-0:
                    destination: test-topic
                    content-type: application/json
                consumeOrderCreatedEvent-in-0:
                    destination: order-created-topic
                    group: product-service-group
            kafka:
                binder:
                    brokers: localhost:9092

    datasource:
        url: jdbc:postgresql://localhost:5433/products
        username: postgres
        password: test12345
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate: 
            ddl-auto: update
    
    # Kafka consumer configuration for Debezium CDC events
    kafka:
        bootstrap-servers: localhost:9092
        consumer:
            group-id: product-service-cdc-group
            auto-offset-reset: earliest
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                spring.json.trusted.packages: "*"

server:
    port: 8082

# Outbox Pattern Configuration
app:
    outbox:
        # Polling-based approach (Legacy) - Debezium'a geçerken disable et
        polling:
            enabled: false  # CDC için kapalı
        # CDC-based approach (Debezium) - Yeni yöntem
        cdc:
            enabled: true   # Debezium aktif

logging:
    level:
        com.turkcell.product_service.cdc: DEBUG
        org.springframework.kafka: INFO

