spring:
    application:
        name: order-service
    cloud:
        function:
            definition: orderCreatedEventProducer
        stream:
            bindings:
                orderCreatedEvent-out-0:
                    destination: order-created-topic
                    content-type: application/json
            kafka:
                binder:
                    brokers: localhost:9092

server:
    port: 8087
